<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>English Practice</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #000000, #0000);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, Arial, sans-serif;
    }

    .card {
      background: white;
      width: 420px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    p {
      color: #444;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: #000000;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #e64a19;
    }

    #response {
      margin-top: 20px;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 6px;
      white-space: pre-line;
      font-weight: 500;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Today we are going to practice English</h2>
    <p>Write a topic to start:</p>
<ul style="list-style: none; padding: 0; margin-bottom: 15px;">
    <li><b>past simple</b></li>
    <li><b>present simple</b></li>
    <li><b>present continuos</b></li>
    <li><b>future will</b></li>
    <li><b>going to</b></li>
</ul>


    <input type="text" id="text" placeholder="Write here">

    <button onclick="send()">Send</button>
    <button onclick="enviarInfo()">📘 Grammar Info</button>


    <div id="response"></div>
  </div>

<script>
  // ✅ Temas + actividades (del app.py, llevado al front)
  const temas = {
    "past simple": [
      { ejemplo: "Example: I played with my friends yesterday / play",
        frase: "She (____) for the exam yesterday. / study",
        respuesta: "studied" },
      { ejemplo: "Example: I worked with my father last night / work",
        frase: "They (____) a movie last night. / watch",
        respuesta: "watched" },
      { ejemplo: "Example: I was tired yesterday / be",
        frase: "I (____) very tired yesterday. / be",
        respuesta: "was" }
    ],
    "present simple": [
      { ejemplo: "Example: I study after school / study",
        frase: "She (____) coffee every morning. / drink",
        respuesta: "drinks" },
      { ejemplo: "Example: He works for his family / work",
        frase: "They (____) football on Sundays. / play",
        respuesta: "play" }
    ],
    "present continuous": [
      { ejemplo: "Example: I am playing football / play",
        frase: "She (____) now. / study",
        respuesta: "is studying" },
      { ejemplo: "Example: He is reading a book / read",
        frase: "They (____) TV at the moment. / watch",
        respuesta: "are watching" }
    ],
    "future will": [
      { ejemplo: "Example: I will play with you / play",
        frase: "I (____) call you later. / call",
        respuesta: "will" },
      { ejemplo: "Example: He will study later",
        frase: "She (____) help you tomorrow. / help",
        respuesta: "will" }
    ],
    "going to": [
      { ejemplo: "Example: She is going to study / go",
        frase: "I am (____) travel next week. / go",
        respuesta: "going to" },
      { ejemplo: "Example: We are going to travel / go",
        frase: "They are (____) buy a car. / buy",
        respuesta: "going to" }
    ]
  };

  const info_temas =
`📘 GRAMMAR GUIDE

🔹 Past Simple
Se usa para acciones terminadas en el pasado.
Ejemplo: I studied yesterday.

🔹 Present Simple
Se usa para rutinas y hábitos.
Ejemplo: She drinks coffee every morning.

🔹 Present Continuous
Se usa para acciones que están ocurriendo ahora.
Ejemplo: She is studying now.

🔹 Future Will
Se usa para decisiones espontáneas y promesas.
Ejemplo: I will call you later.

🔹 Going To
Se usa para planes ya decididos.
Ejemplo: I am going to travel next week.`;

  // ✅ Estado del quiz (por usuario / navegador)
  let temaActual = null;
  let indice = 0;
  let esperandoRespuesta = false;

  function render(texto) {
    document.getElementById("response").innerText = texto;
  }

  function preguntaActualTexto() {
    const q = temas[temaActual][indice];
    return `${q.ejemplo}\n\nCompleta la frase:\n${q.frase}`;
  }

  function send() {
    const input = document.getElementById("text");
    const texto = input.value.trim().toLowerCase();
    input.value = "";

    if (!texto) {
      render("Please write something: a topic (e.g., past simple) or type 'info'.");
      return;
    }

    // 📘 Info global
    if (texto === "info") {
      render(info_temas);
      return;
    }

    // ✅ Elegir tema
    if (!esperandoRespuesta && temas[texto]) {
      temaActual = texto;
      indice = 0;
      esperandoRespuesta = true;
      render(preguntaActualTexto());
      return;
    }

    // ✅ Responder
    if (esperandoRespuesta && temaActual) {
      const q = temas[temaActual][indice];
      if (texto === q.respuesta.toLowerCase()) {
        indice += 1;
        if (indice < temas[temaActual].length) {
          render("✅ Correcto!\n\n" + preguntaActualTexto());
        } else {
          render("🎉 Excelente! Terminaste todas las preguntas.\n\nEscribe otro tema para seguir.");
          esperandoRespuesta = false;
          temaActual = null;
          indice = 0;
        }
      } else {
        render("❌ Incorrecto. Try again.\n\n" + preguntaActualTexto());
      }
      return;
    }

    // ❌ Nada coincide
    render("Topic not found. Try:\n- past simple\n- present simple\n- present continuous\n- future will\n- going to\n\nOr type 'info'.");
  }

  function enviarInfo() {
    render("Available topics:\n- past simple\n- present simple\n- present continuous\n- future will\n- going to\n\nTip: type 'info' for the grammar guide.");
  }
</script>
</body>
</html>
